<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidGrab Pro - ভিডিও ডাউনলোডার</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Hind Siliguri', sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        h1 { color: var(--primary); margin-top: 20px; font-size: 2.5rem; }
        p { color: #94a3b8; margin-bottom: 30px; }
        
        /* Input Box Updated Design */
        .input-box { 
            background: var(--card); 
            padding: 5px; /* বক্সের ভেতরের স্পেস */
            border-radius: 50px; /* রাউন্ডেড ডিজাইন */
            display: flex; 
            align-items: center; 
            border: 1px solid rgba(255,255,255,0.1); 
            margin-bottom: 10px; 
            transition: border 0.3s ease;
        }
        .input-box:focus-within {
            border: 1px solid var(--primary); /* ক্লিক করলে বর্ডার কালার হবে */
        }
        
        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 12px 20px; 
            outline: none; 
            font-size: 16px; 
            width: 100%; 
        }
        
        /* Clear (Cross) Button */
        .action-btn { 
            background: transparent; 
            border: none; 
            color: #94a3b8; 
            cursor: pointer; 
            font-size: 16px; 
            transition: 0.3s; 
            font-weight: bold; 
            border-radius: 50%; 
            width: 35px;
            height: 35px;
            display: none; /* ডিফল্টভাবে লুকানো */
            align-items: center;
            justify-content: center;
            margin-right: 5px;
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.1); color: #ef4444; }

        /* Analyze (চেক করুন) Button with Animation */
        button#analyzeBtn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 0 20px; 
            height: 42px; /* ইনপুট বক্সের উপরে-নিচে মিলে যাওয়ার জন্য নির্দিষ্ট সাইজ */
            border-radius: 40px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            transition: transform 0.15s ease, background 0.3s ease, box-shadow 0.3s ease;
        }
        button#analyzeBtn:hover {
            background: #4f46e5;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        button#analyzeBtn:active {
            transform: scale(0.90); /* ক্লিক করলে বাউন্স এনিমেশন হবে */
        }

        /* Progress Bar */
        .progress-container { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; margin-bottom: 20px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #6366f1, #a855f7); transition: width 0.6s cubic-bezier(0.1, 0.7, 1.0, 0.1); }

        #resultArea { background: var(--card); padding: 20px; border-radius: 20px; display: none; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 20px; }
        video { width: 100%; border-radius: 15px; margin-bottom: 15px; background: #000; }
        .download-btn { display: block; width: 100%; background: #22c55e; color: white; text-decoration: none; padding: 15px 0; border-radius: 12px; font-weight: bold; margin-top: 10px; font-size: 18px; border: none; cursor: pointer; transition: 0.3s; }
        .download-btn:hover { background: #16a34a; }
        
        footer { margin-top: auto; padding: 20px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>VidGrab Pro</h1>
    <p>সব সোশ্যাল মিডিয়া থেকে ভিডিও ডাউনলোড করুন একদম সহজে।</p>

    <div class="input-box">
        <input type="text" id="videoUrl" placeholder="ভিডিওর লিঙ্ক এখানে দিন..." oninput="toggleButtons()">
        
        <!-- Clear (Cross) Button -->
        <button id="clearBtn" class="action-btn" onclick="clearInput()">✕</button>
        
        <button id="analyzeBtn" onclick="analyzeVideo()">চেক করুন</button>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="resultArea">
        <video id="videoPlayer" controls poster="">
            আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
        </video>
        <h3 id="videoTitle" style="margin: 10px 0;"></h3>
        <button id="dlBtn" class="download-btn">সরাসরি ডাউনলোড</button>
    </div>
</div>

<footer>
    &copy; 2024 VidGrab Pro | All Rights Reserved
</footer>

<script>
    const BASE_URL = "http://localhost:3000";
    const urlInput = document.getElementById('videoUrl');
    const clearBtn = document.getElementById('clearBtn');

    // ইনপুট মুছে ফেলা
    function clearInput() {
        urlInput.value = '';
        toggleButtons();
        urlInput.focus(); // ক্রস করার পর কার্সর আবার বক্সে চলে আসবে
    }

    // বাটন কন্ট্রোল (লিংক দিলে শুধু ক্রস বাটন আসবে)
    function toggleButtons() {
        if (urlInput.value.length > 0) {
            clearBtn.style.display = 'flex';
        } else {
            clearBtn.style.display = 'none';
        }
    }

    async function analyzeVideo() {
        const url = urlInput.value.trim();
        const resultArea = document.getElementById('resultArea');
        const videoPlayer = document.getElementById('videoPlayer');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');

        if (!url) {
            alert("দয়া করে একটি লিঙ্ক দিন!");
            return;
        }

        resultArea.style.display = 'none';
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        
        setTimeout(() => { progressBar.style.width = '85%'; }, 100);

        try {
            const response = await fetch(`${BASE_URL}/api/analyze?url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if (data.error) {
                alert("এরর: " + data.error);
                progressContainer.style.display = 'none';
            } else {
                progressBar.style.width = '100%';
                const downloadUrl = `${BASE_URL}/api/download?url=${encodeURIComponent(url)}`;
                videoPlayer.src = downloadUrl; 
                videoPlayer.poster = data.thumbnail || "";
                document.getElementById('videoTitle').innerText = data.title || "Social Video";

                document.getElementById('dlBtn').onclick = function() {
                    window.location.href = downloadUrl;
                };
                
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    resultArea.style.display = 'block';
                }, 600);
            }
        } catch (error) {
            alert("সার্ভার সমস্যা!");
            progressContainer.style.display = 'none';
        }
    }
</script>

</body>
</html>
