<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidGrab Pro - ভিডিও ডাউনলোডার</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Hind Siliguri', sans-serif; background-color: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        h1 { color: var(--primary); margin-top: 20px; font-size: 2.5rem; }
        p { color: #94a3b8; margin-bottom: 30px; }
        
        .input-box { background: var(--card); padding: 10px; border-radius: 15px; display: flex; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        button#analyzeBtn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button#analyzeBtn:active { transform: scale(0.95); }

        /* Progress Bar Styling */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            display: none; /* শুরুতে লুকানো থাকবে */
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.5s cubic-bezier(0.1, 0.7, 1.0, 0.1); /* জোরসে আসার জন্য বিশেষ কার্ভ */
        }

        #resultArea { background: var(--card); padding: 20px; border-radius: 20px; display: none; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 20px; }
        video { width: 100%; border-radius: 15px; margin-bottom: 15px; background: #000; }
        
        .download-btn { display: block; width: 100%; background: #22c55e; color: white; text-decoration: none; padding: 15px 0; border-radius: 12px; font-weight: bold; margin-top: 10px; font-size: 18px; border: none; cursor: pointer; text-align: center; }
        footer { margin-top: auto; padding: 20px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>VidGrab Pro</h1>
    <p>সব সোশ্যাল মিডিয়া থেকে ভিডিও ডাউনলোড করুন একদম সহজে।</p>

    <div class="input-box">
        <input type="text" id="videoUrl" placeholder="ভিডিওর লিঙ্ক এখানে দিন...">
        <button id="analyzeBtn" onclick="analyzeVideo()">চেক করুন</button>
    </div>

    <!-- Progress Line Bar -->
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="resultArea">
        <video id="videoPlayer" controls poster="">
            আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
        </video>
        <h3 id="videoTitle" style="margin: 10px 0;"></h3>
        <button id="dlBtn" class="download-btn">সরাসরি ডাউনলোড</button>
    </div>
</div>

<footer>
    &copy; 2024 VidGrab Pro | All Rights Reserved
</footer>

<script>
    const BASE_URL = "http://localhost:3000";

    async function analyzeVideo() {
        const urlInput = document.getElementById('videoUrl');
        const url = urlInput.value.trim();
        const resultArea = document.getElementById('resultArea');
        const videoPlayer = document.getElementById('videoPlayer');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');

        if (!url) {
            alert("দয়া করে একটি লিঙ্ক দিন!");
            return;
        }

        // এনিমেশন শুরু
        resultArea.style.display = 'none';
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        
        // প্রথমে একটু জোরসে ৮০% পর্যন্ত যাবে
        setTimeout(() => {
            progressBar.style.width = '80%';
        }, 100);

        try {
            const response = await fetch(`${BASE_URL}/api/analyze?url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if (data.error) {
                alert("এরর: " + data.error);
                progressContainer.style.display = 'none';
            } else {
                // কাজ শেষ হলে ১০০% হয়ে যাবে
                progressBar.style.width = '100%';
                
                const downloadUrl = `${BASE_URL}/api/download?url=${encodeURIComponent(url)}`;
                
                videoPlayer.src = downloadUrl; 
                videoPlayer.poster = data.thumbnail || "";
                document.getElementById('videoTitle').innerText = data.title || "Social Video";

                document.getElementById('dlBtn').onclick = function() {
                    window.location.href = downloadUrl;
                };
                
                // অল্প সময় পর বারটি লুকিয়ে রেজাল্ট দেখাবে
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    resultArea.style.display = 'block';
                }, 500);
            }
        } catch (error) {
            alert("সার্ভার বন্ধ! টার্মাক্সে Cloudflared Tunnel এবং node server.js চালু আছে কি না দেখুন।");
            progressContainer.style.display = 'none';
        }
    }
</script>

</body>
</html>
