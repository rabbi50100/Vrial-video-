<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Downloader Pro</title>
    <style>
        :root { --blue: #1877f2; --green: #42b72a; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .box { background: white; width: 100%; max-width: 450px; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box;}
        button { width: 100%; background: var(--blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .progress-bar { display: none; background: #eee; height: 10px; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress-fill { background: var(--blue); width: 0%; height: 100%; transition: 0.4s; }

        #result { display: none; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; }
        .dl-btn { background: var(--green); color: white; text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color: var(--blue); text-align: center;">FB Downloader</h2>
    <input type="text" id="url" placeholder="লিংক পেস্ট করুন...">
    <button onclick="fetchVideo()">Download</button>

    <div class="progress-bar" id="pBar"><div class="progress-fill" id="pFill"></div></div>

    <div id="result">
        <img id="thumb" style="width: 100%; border-radius: 8px;" src="">
        <h4 id="title"></h4>
        <table>
            <thead><tr><th>Quality</th><th>Size</th><th>Action</th></tr></thead>
            <tbody id="table"></tbody>
        </table>
    </div>
</div>

<script>
    // --- এখানে আপনার মোবাইলের IP টি বসান ---
    const myIP = "192.168.0.103"; // উদাহরণ: "192.168.0.105"

    async function fetchVideo() {
        const url = document.getElementById('url').value;
        const pBar = document.getElementById('pBar');
        const pFill = document.getElementById('pFill');
        const result = document.getElementById('result');

        if(!url) return alert("লিংক দিন!");

        result.style.display = 'none';
        pBar.style.display = 'block';
        pFill.style.width = '30%';

        try {
            const response = await fetch(`http://${myIP}:3000/fetch?url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if(data.status === "Success") {
                pFill.style.width = '100%';
                document.getElementById('thumb').src = data.thumbnail;
                document.getElementById('title').innerText = data.title;
                
                let rows = '';
                data.formats.forEach(f => {
                    // ডাউনলোড বাটনটি এখন সরাসরি আমাদের সার্ভারের 'download-now' রুট ব্যবহার করবে
                    rows += `<tr>
                        <td>${f.resolution}</td>
                        <td>${f.size}</td>
                        <td><a href="http://${myIP}:3000/download-now?url=${encodeURIComponent(f.url)}&name=${encodeURIComponent(data.title)}" class="dl-btn">Download</a></td>
                    </tr>`;
                });
                document.getElementById('table').innerHTML = rows;
                setTimeout(() => { pBar.style.display = 'none'; result.style.display = 'block'; }, 500);
            } else { alert("Error!"); pBar.style.display = 'none'; }
        } catch (e) { alert("সার্ভার অফ আছে!"); pBar.style.display = 'none'; }
    }
</script>

</body>
</html>
